name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFTLINT_VERSION: "0.63.2"
  RESULT_BUNDLE: .build/TestResults.xcresult
  COV_XML: .build/coverage.xml
  SCHEME: Zhip
  PROJECT: Zhip.xcodeproj
  SIM_DEVICE: iPhone 17

jobs:
  ci:
    name: CI
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      # ── 1. Typos ──────────────────────────────────────────────────────────────
      - name: Install typos
        run: brew install typos-cli

      - name: Check for typos
        run: typos

      # ── 2. SwiftFormat ────────────────────────────────────────────────────────
      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: swiftformat --lint

      # ── 3. SwiftLint ──────────────────────────────────────────────────────────
      - name: Install SwiftLint ${{ env.SWIFTLINT_VERSION }}
        run: |
          curl -fsSL \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/SwiftLint.pkg" \
            -o /tmp/swiftlint.pkg
          sudo installer -pkg /tmp/swiftlint.pkg -target /
          swiftlint version

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

      # ── 4. Test + coverage ────────────────────────────────────────────────────
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install xcresultparser
        run: brew install xcresultparser

      - name: Select Xcode 26.1.1
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer

      - name: Runner info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devices available | grep -i iphone || echo "(none)"

      - name: Validate simulator destination
        run: |
          if ! AVAILABLE_IOS_DEVICES=$(xcrun simctl list devices available "iOS $SIM_OS"); then
            echo "Failed to query simulators for runtime iOS $SIM_OS" >&2
            xcrun simctl list runtimes || true
            exit 1
          fi
          echo "$AVAILABLE_IOS_DEVICES"
          MATCHED_SIMULATOR_LINE=$(
            echo "$AVAILABLE_IOS_DEVICES" | awk -v device="$SIM_DEVICE" '
              /^[[:space:]]+/ {
                line = $0
                sub(/^[[:space:]]+/, "", line)
                name = line
                sub(/ \(.*/, "", name)
                if (name == device) {
                  print $0
                  exit
                }
              }
            '
          )
          if [ -z "$MATCHED_SIMULATOR_LINE" ]; then
            echo "Expected simulator not available: $SIM_DEVICE (iOS $SIM_OS)" >&2
            exit 1
          fi
          echo "$MATCHED_SIMULATOR_LINE"

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build & test with coverage
        run: |
          set -o pipefail
          mkdir -p .build
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE,OS=$SIM_OS,arch=arm64" \
            -only-testing:ZhipTests \
            -enableCodeCoverage YES \
            -resultBundlePath "$RESULT_BUNDLE" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcpretty

      - name: Convert coverage to Cobertura XML
        run: xcresultparser --output-format cobertura "$RESULT_BUNDLE" > "$COV_XML"

      - name: Print coverage summary
        run: xcrun xccov view --report "$RESULT_BUNDLE"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ env.COV_XML }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
