disabled_rules:
  - nesting
  - trailing_newline
  - trailing_whitespace
  - todo
  - closure_parameter_position
  - unused_closure_parameter
  - mark
  - weak_delegate
  - empty_parameters

# SwiftFormat's --commas always adds trailing commas in multi-line collections;
# require them here so both tools agree.
trailing_comma:
  mandatory_comma: true

included:
  - Sources
  - Tests

excluded:
  - Configurations

line_length: 200

# swiftformat with --wrapparameters before-first puts { on its own line for multiline
# function signatures; allow this so both tools agree.
opening_brace:
  ignore_multiline_function_signatures: true

type_name:
  min_length: 3
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - €

file_length:
  warning: 350
  error: 500
  ignore_comment_only_lines: true

identifier_name:
  min_length: 1
  max_length:
    warning: 60
    error: 80
  allowed_symbols: ["_"]
  validates_start_with_lowercase: false

type_body_length:
  warning: 200
  error: 400

function_parameter_count:
  warning: 4
  error: 5

function_body_length:
  warning: 65
  error: 80
  ignores_comments: true

cyclomatic_complexity:
  warning: 10
  error: 15
