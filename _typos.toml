[files]
extend-exclude = [
	"Zhip.xcodeproj/project.pbxproj",
	# Xcode scheme files contain UUIDs that trigger false positives
	"Zhip.xcodeproj/xcshareddata/xcschemes/",
	# xcstrings files contain translated strings that may look like typos
	"Sources/Application/Localization/",
	"Sources/Application/GoogleService-Info.plist",
]

[default.extend-identifiers]
udid = "udid"
UDID = "UDID"
minumumPasswordLength = "minumumPasswordLength" # typo in Zesame, I should fix.
